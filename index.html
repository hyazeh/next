<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>CORE_DIAGNOSTICS</title>
    <style>
        :root { --neon: #00f2ff; --dark: #050505; }
        body {
            background: var(--dark);
            color: var(--neon);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 2px;
        }


        body::before {
            content: "";
            position: absolute;
            width: 200%; height: 200%;
            background-image: linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg);
            animation: move 10s linear infinite;
            z-index: -1;
        }

        @keyframes move { from { transform: perspective(500px) rotateX(60deg) translateY(0); } to { transform: perspective(500px) rotateX(60deg) translateY(50px); } }

        .dashboard {
            border: 1px solid var(--neon);
            padding: 40px;
            background: rgba(0, 0, 0, 0.8);
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.2);
            position: relative;
            backdrop-filter: blur(5px);
        }

        .glitch {
            font-size: 3rem;
            font-weight: bold;
            text-shadow: 2px 2px #ff00ea;
            animation: glitch 1s infinite;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); text-shadow: -2px -2px #ff00ea; }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        .stat-bar {
            width: 100%;
            height: 10px;
            background: #111;
            margin: 20px 0;
            border: 1px solid var(--neon);
            position: relative;
        }

        .fill {
            height: 100%;
            background: var(--neon);
            width: 0%;
            transition: width 0.5s;
            box-shadow: 0 0 15px var(--neon);
        }

        .details { font-size: 0.8rem; opacity: 0.8; margin-top: 10px; }
        

        .cursor-follower {
            position: fixed;
            width: 40px; height: 40px;
            border: 1px solid var(--neon);
            border-radius: 50%;
            pointer-events: none;
            transition: transform 0.1s;
            z-index: 999;
        }
    </style>
</head>
<body>

<div class="cursor-follower" id="follower"></div>

<div class="dashboard">
    <div class="glitch">SYSTEM CRITICAL</div>
    <div class="details">CPU LOAD: <span id="cpu">0%</span></div>
    <div class="stat-bar"><div class="fill" id="bar1"></div></div>
    
    <div class="details">MEMORY DUMP: <span id="mem">0%</span></div>
    <div class="stat-bar"><div class="fill" id="bar2"></div></div>

    <div class="details" style="color: #ff00ea;">Warning: Unauthorized access detected</div>
</div>

<script>

    const follower = document.getElementById('follower');
    document.addEventListener('mousemove', (e) => {
        follower.style.left = e.clientX - 20 + 'px';
        follower.style.top = e.clientY - 20 + 'px';
    });

    function updateStats() {
        const cpu = Math.floor(Math.random() * 100);
        const mem = Math.floor(Math.random() * 100);
        
        document.getElementById('cpu').innerText = cpu + "%";
        document.getElementById('bar1').style.width = cpu + "%";
        
        document.getElementById('mem').innerText = mem + "%";
        document.getElementById('bar2').style.width = mem + "%";
    }

    setInterval(updateStats, 2000);
    updateStats();
</script>

</body>
</html>
